{% extends 'MyInventoryApp/base.html' %}

{% block content %}
    <h2>List of Suppliers</h2>

    <div class="mb-3">
        <a href="{% url 'add_bottle' %}" class="btn btn-primary">Add Water Bottles</a>
        <a href="{% url 'manage_account' pk=user.pk %}" class="btn btn-secondary">Manage Account</a>
        <a href="{% url 'logout' %}" class="btn btn-danger">Logout</a>
    </div>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>Name</th>
                <th>City</th>
                <th>Country</th>
                <th>Created At</th>
            </tr>
        </thead>
        <tbody>
            {% for supplier in suppliers %}
                <tr>
                    <!-- clickable name -->
                    <td>
                        <a href="{% url 'view_bottles' %}"> 
                            {{ supplier.name }}
                        </a>
                    </td>
                    <td>{{ supplier.city }}</td>
                    <td>{{ supplier.country }}</td>
                    <td>{{ supplier.created_at }}</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
