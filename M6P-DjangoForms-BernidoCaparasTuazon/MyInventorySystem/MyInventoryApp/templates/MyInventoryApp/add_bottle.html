{% extends 'MyInventoryApp/base.html' %}
{% load static %}

{% block content %}
<div class="col-12">
    <div class="card">
        <div class="card-header">
            Type in Bottle Details:
        </div>
        <div class="card-body">
            <form method="POST" action="{% url 'add_bottle' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label>SKU:</label>
                    <input type="text" class="form-control" name="sku" required>
                </div>

                <div class="mb-3">
                    <label>Brand:</label>
                    <input type="text" class="form-control" name="brand" required>
                </div>
                
                <div class="mb-3">
                    <label>Cost:</label>
                    <input type="number" class="form-control" name="cost" required>
                </div>

                <div class="mb-3">
                    <label>Size:</label>
                    <input type="text" class="form-control" name="size" required>
                </div>

                <div class="mb-3">
                    <label>Mouth Size:</label>
                    <input type="text" class="form-control" name="mouth_size" required>
                </div>

                <div class="mb-3">
                    <label>Color:</label>
                    <input type="text" class="form-control" name="color" required>
                </div>

                <!-- supplier dropdown -->
                <div class="mb-3">
                    <label>Supplier:</label>
                    <select class="form-control" name="supplier_id">
                        {% for supplier in suppliers %}
                            <option value="{{ supplier.id }}">{{ supplier.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label>Current Quantity:</label>
                    <input type="number" class="form-control" name="current_quantity" required>
                </div>

                <button type="submit" class="btn btn-secondary">Add Bottle</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
